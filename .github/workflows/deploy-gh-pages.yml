name: Deploy Flutter Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  PAGES_BASE_HREF: /today_music/
  SPONSOR_AD_CONFIG_URL: https://kehini20.github.io/today_music/ads/ad_config.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: >
          flutter build web --release
          --base-href "$PAGES_BASE_HREF"
          --dart-define "SPONSOR_AD_CONFIG_URL=$SPONSOR_AD_CONFIG_URL"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
